# ============================================================================
# Hookline — локальное окружение для разработки.
#
# Поднять:      make up
# Погасить:     make down
# Сбросить БД:  make down-v   (удалит данные!)
#
# Переменные берутся из файла .env
# ============================================================================

services:

  postgres:
    image: postgres:16-alpine
    # container_name НЕ задаём специально: в фазе 3 понадобится запускать
    # несколько реплик воркеров, а фиксированное имя это запрещает.
    restart: unless-stopped
    environment:
      # Эти три переменные читает САМ контейнер Postgres при первом запуске
      # и создаёт по ним пользователя и базу.
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      # Данные кладём в подпапку тома.
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      # Формат "ХОСТ:КОНТЕЙНЕР".
      # Внутри контейнера Postgres ВСЕГДА слушает 5432 — это не настраивается.
      # Снаружи вешаем на 5433, чтобы не конфликтовать с локально
      # установленным Postgres, если он у кого-то есть на 5432.
      # Это же число стоит в DATABASE_URL в .env — они должны совпадать.
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      # Именованный том (не папка в проекте): не мусорит в репозитории,
      # не ловит проблемы с правами доступа на macOS/Windows.
      - hookline-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  hookline-pg-data:

# ----------------------------------------------------------------------------
# Сервисы, которые появятся позже (пока их код не написан — их тут быть не должно,
# иначе compose откажется запускаться). Добавляем по мере готовности:
#
#   sink            — фаза 1, тестовый получатель (cmd/sink)
#   hookline-api    — фаза 1, когда appпоявится HTTP-сервер
#   hookline-worker — фаза 1–3, в фазе 3 запускаем в 3 репликах
#   grafana         — фаза 3, вместе с метриками
# ----------------------------------------------------------------------------